<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>スタンプQR 印刷用</title>
<style>
  body{font-family:sans-serif;margin:0;padding:16px;color:#222}
  h1{font-size:18px}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:24px}
  .card{border:2px dashed #bbb;border-radius:12px;padding:18px;text-align:center;page-break-inside:avoid}
  .card img{width:92%;max-width:340px}
  .t{font-size:22px;font-weight:bold;margin-bottom:8px}
  .c{color:#999;font-size:10px;margin-top:8px;word-break:break-all}
  @media print{ .c{display:none} }
</style>
</head>
<body>
<h1>各エリア掲示用QRコード（大きめ・余白確保済み）</h1>
<div class="grid">
  <div class="card"><div class="t">① うけつけ広場</div><img src="area-A1_large.png"><div class="c">area=A1</div></div>
  <div class="card"><div class="t">② ステージ前</div><img src="area-A2_large.png"><div class="c">area=A2</div></div>
  <div class="card"><div class="t">③ キッズコーナー</div><img src="area-A3_large.png"><div class="c">area=A3</div></div>
  <div class="card"><div class="t">④ 工場見学入口</div><img src="area-A4_large.png"><div class="c">area=A4</div></div>
  <div class="card"><div class="t">⑤ ふれあい動物園</div><img src="area-A5_large.png"><div class="c">area=A5</div></div>
  <div class="card"><div class="t">⑥ キッチンカー前</div><img src="area-A6_large.png"><div class="c">area=A6</div></div>
  <div class="card"><div class="t">⑦ ゲームひろば</div><img src="area-A7_large.png"><div class="c">area=A7</div></div>
  <div class="card"><div class="t">⑧ 写真スポット</div><img src="area-A8_large.png"><div class="c">area=A8</div></div>
</div>
</body>
</html>
