<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#e8552d" />
  <title>スタンプラリー</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="images/icon-192.png" />
  <link rel="apple-touch-icon" href="images/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="wrap">
    <header class="hero">
      <img class="hero__logo" src="images/logo.png" alt="" />
      <h1 class="hero__title" id="eventName">スタンプラリー</h1>
      <p class="hero__tagline" id="eventTagline"></p>
    </header>

    <!-- クリア／コンプリート バナー -->
    <section id="statusBanner" class="banner banner--hidden" aria-live="polite"></section>

    <!-- 進捗 -->
    <section class="progress card">
      <div class="progress__numbers">
        <span class="progress__count" id="countNow">0</span>
        <span class="progress__sep">/</span>
        <span class="progress__total" id="countTotal">0</span>
        <span class="progress__unit">個</span>
      </div>
      <div class="progress__bar"><div class="progress__fill" id="progressFill"></div></div>
      <p class="progress__hint" id="progressHint"></p>
    </section>

    <!-- 説明 -->
    <section class="card desc" id="descBox"></section>

    <!-- スタンプ一覧 -->
    <section class="stamps" id="stampGrid" aria-label="スタンプ一覧"></section>

    <!-- 注意事項 -->
    <section class="card notes">
      <h2 class="notes__title">ご利用にあたって</h2>
      <ul class="notes__list">
        <li>同じスマートフォン・同じブラウザでご利用ください。</li>
        <li>ブラウザの履歴やサイトデータを削除すると、スタンプ情報が消える場合があります。</li>
        <li>別のブラウザで開くと、スタンプ情報が引き継がれない場合があります。</li>
        <li>QRコードが読み取れない場合はスタッフに声をかけてください。</li>
      </ul>
    </section>

    <!-- LocalStorage 使用不可時の警告 -->
    <section id="noStorageWarn" class="card warn warn--hidden">
      お使いのブラウザの設定では、スタンプ情報を保存できません。プライベートモードを解除してお試しください。
    </section>

    <footer class="foot">
      <span id="participantId" class="foot__pid"></span>
    </footer>
  </main>

  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").catch(function () {});
      });
    }
  </script>
</body>
</html>
